[bmcu ams0]
bmcu_addr: 192.168.1.50
# Optional: seconds for each HTTP request
request_timeout: 5.0
# Optional: total seconds to wait for /state -> IDLE
busy_timeout: 60.0
# Optional: polling interval while waiting for IDLE
poll_interval: 1.0
# Optional: delay after /input|/output returns OK before first /state poll
start_settle_time: 0.5

[gcode_macro BMCU_UNLOAD_ALL]
gcode:
  # 回抽 10cm，此处应该提前用切刀切断耗材
  SAVE_GCODE_STATE NAME=BMCU_RETRACT_STATE
  M83
  G1 E-100 F600
  RESTORE_GCODE_STATE NAME=BMCU_RETRACT_STATE
  # 所有通道退料
  BMCU_UNLOAD BMCU=ams0 CHANNEL=0
  BMCU_UNLOAD BMCU=ams0 CHANNEL=1
  BMCU_UNLOAD BMCU=ams0 CHANNEL=2
  BMCU_UNLOAD BMCU=ams0 CHANNEL=3
